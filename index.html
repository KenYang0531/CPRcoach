<style>
  :root{
    --brand:#37668a; --brand-d:#2b5170;
    --ink:#22323f; --bg:#ffffff; --card:#f5f7f9; --line:#dde4ea; --muted:#9bb0c0;
    --good:#2e9e63; --warn:#ef8b1f; --idle:#c2cdd6; --track:#e3e9ee;
    --mono:"SFMono-Regular",Consolas,Menlo,monospace;
    --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); overflow:hidden; display:flex; flex-direction:column}
  .topbar{flex:0 0 auto; display:flex; align-items:center; gap:12px; padding:8px 16px; border-bottom:1px solid var(--line)}
  .logo{height:24px; width:auto; display:block}
  .topbar h1{font-size:15px; font-weight:800; color:var(--brand)}
  .fb-btn{margin-left:auto; background:none; border:1px solid var(--line); border-radius:8px; padding:5px 10px;
    font-family:inherit; font-size:12px; font-weight:700; color:var(--brand); cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:4px}
  .fb-btn svg{width:14px; height:14px}
  .fb-modal{position:fixed; inset:0; background:rgba(20,40,58,.45); z-index:70; display:none; align-items:center; justify-content:center; padding:18px}
  .fb-modal.show{display:flex}
  .fb-inner{background:#fff; border-radius:14px; width:min(420px,100%); padding:18px; box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .fb-inner h3{font-size:16px; color:var(--brand); margin-bottom:10px}
  .fb-inner textarea{width:100%; height:120px; border:1px solid var(--line); border-radius:10px; padding:10px; font-family:inherit; font-size:14px; resize:vertical}
  .fb-inner .fb-actions{display:flex; gap:8px; margin-top:10px; justify-content:flex-end}
  .fb-inner .fb-cancel{background:none; border:1px solid var(--line); border-radius:8px; padding:8px 16px; font-family:inherit; font-size:14px; cursor:pointer; color:#6b7e8c}
  .fb-inner .fb-send{background:var(--brand); border:none; border-radius:8px; padding:8px 20px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; color:#fff}

  .live{flex:1 1 auto; display:flex; gap:12px; padding:12px 16px; min-height:0}
  .leftcol{flex:0 0 clamp(160px,21%,280px); display:flex; flex-direction:column; gap:10px; min-width:0}
  .videowrap{flex:1 1 auto; position:relative; border-radius:14px; overflow:hidden; background:#e7edf2; min-height:0; border:1px solid var(--line)}
  video, canvas#overlay{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .hint{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color:var(--ink); text-align:center; padding:16px; font-size:13.5px; line-height:1.6; background:#fff}
  .guideimg{max-width:80%; max-height:50%; width:auto; height:auto; border-radius:10px}
  .tap-cue{font-size:16px; font-weight:800; color:var(--brand)}
  .vid-badge{position:absolute; top:8px; left:8px; background:rgba(20,40,58,.72); backdrop-filter:blur(4px); border-radius:12px; padding:5px 12px 7px}
  .vid-badge #vstatus{display:block; font-size:11px; color:#bcd3e6; font-weight:700; margin-bottom:1px}
  .vid-badge #vtimer{font-family:var(--mono); font-size:34px; font-weight:700; line-height:1; color:#fff}
  .cam-switch{position:absolute; bottom:8px; right:8px; width:42px; height:42px; border-radius:50%;
    border:none; background:rgba(20,40,58,.72); backdrop-filter:blur(4px); color:#e3edf4; cursor:pointer;
    display:none; align-items:center; justify-content:center; padding:0}
  .cam-switch.show{display:flex}
  .cam-switch svg{width:22px; height:22px}
  .warn{position:absolute; left:8px; bottom:8px; display:none;
    background:rgba(239,139,31,.95); color:#fff; font-weight:800; font-size:13px; padding:8px 12px; border-radius:10px; text-align:left; max-width:70%}
  .warn.show{display:block}

  .controlrow{flex:0 0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .ctl-label{font-size:12.5px; color:#6b7e8c; font-weight:700; white-space:nowrap}
  select#dur{font-family:inherit; font-size:16px; font-weight:700; color:var(--ink);
    background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px 10px}
  select#dur:disabled{opacity:.5}
  button#toggle{font-family:inherit; font-weight:800; font-size:15px; border:none; border-radius:10px;
    padding:11px 26px; cursor:pointer; background:var(--brand); color:#fff}
  button#toggle.is-stop{background:#7e93a3; padding:0; width:52px; height:46px; display:inline-flex; align-items:center; justify-content:center}
  button#toggle.is-stop svg{width:20px; height:20px; color:#fff}
  button#restart{margin-left:auto; display:none; padding:0; width:52px; height:46px; align-items:center; justify-content:center;
    background:#fff; color:var(--brand); border:1px solid var(--brand); border-radius:10px; cursor:pointer}
  button#restart svg{width:22px; height:22px}

  .indpanel{flex:1 1 auto; display:flex; gap:10px; min-height:0; min-width:0}
  .ind{flex:1 1 0; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:6px 6px 4px;
    display:flex; flex-direction:column; align-items:center; min-height:0; min-width:0}
  .ind .ititle{font-size:14px; color:var(--brand); font-weight:800; letter-spacing:.3px}
  .ind svg{flex:1 1 0; min-height:0; width:100%; height:100%; display:block}
  .ind .ival{font-family:var(--mono); font-weight:700; line-height:1; font-size:24px; color:var(--idle)}
  .ind .ival .u{font-size:11px; color:#8aa0b3; font-family:var(--sans)}

  /* RESULTS */
  .results-page{position:fixed; inset:0; background:var(--bg); z-index:50; display:none; flex-direction:column; padding:16px 16px 18px; overflow:auto}
  .results-page.show{display:flex}
  .rp-head{flex:0 0 auto; text-align:center; margin-bottom:10px}
  .rp-head h2{font-size:19px; color:var(--brand)}
  .rp-meta{font-size:12.5px; color:#6b7e8c; margin-top:3px}
  .rcards{flex:1 1 auto; display:flex; gap:10px; min-height:0; align-items:stretch}
  .rc{flex:1 1 0; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 8px;
    display:flex; flex-direction:column; align-items:center; gap:4px; min-height:0}
  .rc.tap{cursor:pointer}
  .rc .rtitle{font-size:14px; color:var(--brand); font-weight:800; text-align:center}
  .rc .racc{font-family:var(--mono); font-size:30px; font-weight:800; line-height:1}
  .rc svg{flex:1 1 0; min-height:0; width:100%; max-height:160px; display:block}
  .rc .rsub{font-size:12px; color:#6b7e8c}
  .rc .rsub b{font-family:var(--mono); font-size:16px; color:var(--ink)}
  .btn-again{flex:0 0 auto; margin-top:14px; width:100%; font-family:inherit; font-weight:800; font-size:16px;
    border:none; border-radius:10px; padding:13px; cursor:pointer; background:var(--brand); color:#fff}

  .chart-modal{position:fixed; inset:0; background:rgba(20,40,58,.45); z-index:60; display:none; align-items:center; justify-content:center; padding:18px}
  .chart-modal.show{display:flex}
  .cm-inner{background:#fff; border-radius:14px; width:min(560px,100%); padding:14px 16px 18px; box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .cm-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
  .cm-head b{color:var(--brand); font-size:15px}
  .cm-head button{background:none; border:none; font-size:18px; color:#6b7e8c; cursor:pointer}
  #rateChart{width:100%; height:240px; display:block}

  @media(max-width:640px){
    .live{flex-wrap:wrap; overflow:auto}
    .leftcol{flex:1 1 100%}
    .videowrap{aspect-ratio:16/10}
    .indpanel{flex:1 1 100%; flex-wrap:wrap}
    .ind{flex:1 1 44%; min-height:150px}
    .rcards{flex-wrap:wrap} .rc{flex:1 1 40%}
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const cam=$('cam'), overlay=$('overlay'), octx=overlay.getContext('2d'), toggle=$('toggle');
  const ICON_STOP='<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2.5" fill="currentColor"/></svg>';

  const WIN_MS=2500, MIN_AMP=0.02, ARM_STRAIGHT=160;
  const POSTURE_HOLD_MS=500, P_TOGETHER=0.55, P_BELOW=0.40, P_CENTER=0.60;
  const GMIN=80, GMAX=140, BLO=100, BHI=120, GC=(GMIN+GMAX)/2, GH=(GMAX-GMIN)/2;
  const RECOIL_PASS=0.85, RATE_AVG_N=4, CAL_MS=3000;
  const RHYTHM_N=3, RHYTHM_LO=250, RHYTHM_HI=1000;   // 需連續規律按壓才開始，避免走位誤觸發

  let running=false, cameraStarted=false, pose=null, camera=null, timerId=null;
  let durationMin=1, measureStartT=null, facing='user', armed=false;
  let postureSinceT=null, lastPostureT=0;
  let sig=[], comps=[], state='up', releaseMinY=1;
  let armLog=[], rateLog=[], recoilLog=[], series=[], calTop=1, calBottom=0;

  function angle(a,b,c){ const v1={x:a.x-b.x,y:a.y-b.y}, v2={x:c.x-b.x,y:c.y-b.y};
    const dot=v1.x*v2.x+v1.y*v2.y, m=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
    if(m===0) return null; return Math.acos(Math.max(-1,Math.min(1,dot/m)))*180/Math.PI; }
  const vis = lm => lm && lm.visibility>0.5;
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  function fmt(s){ s=Math.max(0,Math.round(s)); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

  function rotateNeedle(el,bpm){ el.setAttribute('transform',`rotate(${clamp(((bpm-GC)/GH)*90,-90,90)} 60 66)`); }
  function dialPoint(bpm){ const p=clamp((bpm-GMIN)/(GMAX-GMIN),0,1), th=(180-p*180)*Math.PI/180; return [60+46*Math.cos(th),66-46*Math.sin(th)]; }
  function segPath(lo,hi){ const a=dialPoint(lo), b=dialPoint(hi); return `M ${a[0].toFixed(1)} ${a[1].toFixed(1)} A 46 46 0 0 1 ${b[0].toFixed(1)} ${b[1].toFixed(1)}`; }
  function fillDiamond(el,f){ f=clamp(f,0,1); el.setAttribute('transform',`translate(${32-32*f} ${32-32*f}) scale(${f})`); }
  function armColor(a){ if(a==null) return 'var(--idle)'; return a>=ARM_STRAIGHT?'var(--good)':'var(--warn)'; }
  function checkPosture(L){   // 倒三角按壓姿勢：雙手靠攏、在肩膀下方、置於身體中線
    if(!(vis(L[11])&&vis(L[12])&&vis(L[15])&&vis(L[16]))) return false;
    const sw=Math.abs(L[11].x-L[12].x); if(sw<0.05) return false;
    const shY=(L[11].y+L[12].y)/2, shMidX=(L[11].x+L[12].x)/2;
    const wSep=Math.abs(L[15].x-L[16].x), wMidX=(L[15].x+L[16].x)/2, wMidY=(L[15].y+L[16].y)/2;
    if(wSep > P_TOGETHER*sw) return false;
    if((wMidY-shY) < P_BELOW*sw) return false;
    if(Math.abs(wMidX-shMidX) > P_CENTER*sw) return false;
    return true;
  }

  function setRate(bpm){
    const num=$('rateNum'), unit=$('rateUnit'), wrap=$('needleWrap'), bl=$('bandLeft'), br=$('bandRight');
    if(bpm==null){ num.textContent=''; unit.textContent=''; num.style.color='var(--idle)'; wrap.setAttribute('visibility','hidden');
      bl.setAttribute('stroke','var(--track)'); br.setAttribute('stroke','var(--track)'); return; }
    num.textContent=bpm; unit.textContent=' /分'; rotateNeedle($('needle'),bpm); wrap.setAttribute('visibility','visible');
    const slow=bpm<BLO, fast=bpm>BHI;
    num.style.color = (slow||fast)?'var(--warn)':'var(--good)';
    bl.setAttribute('stroke', slow?'var(--warn)':'var(--track)');
    br.setAttribute('stroke', fast?'var(--warn)':'var(--track)');
  }
  function setRecoilFill(f){ const el=$('recoilFill'); fillDiamond(el,f); el.setAttribute('fill', f>=RECOIL_PASS?'var(--good)':'var(--warn)'); }
  function setArms(aL,aR){   // 圖示對齊畫面：畫面右側的手＝圖示右臂（前鏡頭鏡像、後鏡頭不鏡像皆正確）
    const mir = facing==='user';
    const rA = mir ? aR : aL, lA = mir ? aL : aR;
    $('armFigR').setAttribute('stroke',armColor(rA)); $('armFigL').setAttribute('stroke',armColor(lA));
    $('armFigR').setAttribute('stroke-width',(rA!=null&&rA<ARM_STRAIGHT)?11:8);
    $('armFigL').setAttribute('stroke-width',(lA!=null&&lA<ARM_STRAIGHT)?11:8);
  }

  function onResults(res){
    octx.clearRect(0,0,overlay.width,overlay.height);
    const now=performance.now();
    if(!res.poseLandmarks) return;
    const L=res.poseLandmarks;
    if(window.drawConnectors && window.POSE_CONNECTIONS){
      drawConnectors(octx,L,POSE_CONNECTIONS,{color:'rgba(255,255,255,.6)',lineWidth:2});
      drawLandmarks(octx,L,{color:'#37668a',lineWidth:1,radius:3});
    }
    if(!running) return;

    const aL=(vis(L[11])&&vis(L[13])&&vis(L[15]))?angle(L[11],L[13],L[15]):null;
    const aR=(vis(L[12])&&vis(L[14])&&vis(L[16]))?angle(L[12],L[14],L[16]):null;
    setArms(armed?aL:null, armed?aR:null);
    let armOK=null; const av=[aL,aR].filter(v=>v!=null); if(av.length) armOK=Math.min(...av)>=ARM_STRAIGHT;

    const post=checkPosture(L);
    if(post) lastPostureT=now;
    if(!post){ if(!armed) comps=[]; sig=[]; postureSinceT=null; setRate(null); return; }
    if(postureSinceT===null) postureSinceT=now;
    if(now-postureSinceT < POSTURE_HOLD_MS) return;

    const wr=[]; if(vis(L[15]))wr.push(L[15].y); if(vis(L[16]))wr.push(L[16].y);
    if(!wr.length) return;
    const y=wr.reduce((a,b)=>a+b,0)/wr.length;
    sig.push({t:now,y}); while(sig.length && now-sig[0].t>WIN_MS) sig.shift();
    let rMin=1,rMax=0; for(const p of sig){ if(p.y<rMin)rMin=p.y; if(p.y>rMax)rMax=p.y; }
    const amp=rMax-rMin;
    if(amp<MIN_AMP){ if(armed && comps.length && now-comps[comps.length-1].t>WIN_MS) setRate(null); releaseMinY=Math.min(releaseMinY,y); return; }

    if(armed && measureStartT!=null && now-measureStartT<CAL_MS){ calTop=Math.min(calTop,y); calBottom=Math.max(calBottom,y); }
    const useCal = armed && measureStartT!=null && (now-measureStartT)>=CAL_MS && (calBottom-calTop)>0;
    const top=useCal?calTop:rMin, bottom=useCal?calBottom:rMax;
    if(armed) setRecoilFill((bottom-y)/(bottom-top));

    const mid=(rMin+rMax)/2, band=amp*0.18, hi=mid+band, lo=mid-band;
    if(state==='up'){
      releaseMinY=Math.min(releaseMinY,y);
      if(y>hi){
        state='down'; comps.push({t:now});
        if(!armed){
          const n=comps.length;
          if(n>=RHYTHM_N){
            let ok=true;
            for(let i=0;i<RHYTHM_N-1;i++){ const g=comps[n-1-i].t-comps[n-2-i].t; if(g<RHYTHM_LO||g>RHYTHM_HI){ok=false;break;} }
            if(ok){ armed=true; comps=comps.slice(n-RHYTHM_N); measureStartT=comps[0].t; calTop=1; calBottom=0; $('vstatus').textContent='計時中'; }
          }
        }
        if(armed){
          armLog.push(armOK);
          if(comps.length>=2){ const k=Math.min(RATE_AVG_N,comps.length), seg=comps.slice(-k), span=seg[seg.length-1].t-seg[0].t;
            if(span>0){ const bpm=Math.round(60000*(k-1)/span); setRate(bpm); rateLog.push(bpm); series.push({t:(now-measureStartT)/1000, bpm}); } }
          if(useCal){ const frac=(calBottom-releaseMinY)/(calBottom-calTop); recoilLog.push(frac>=RECOIL_PASS); }
        }
        releaseMinY=1;
      }
    } else if(y<lo) state='up';
  }

  function tick(){
    const now=performance.now();
    $('warn').classList.toggle('show', running && (now-lastPostureT>800));
    if(measureStartT===null) return;
    const elapsed=(now-measureStartT)/1000;
    if(durationMin>0){ const rem=durationMin*60-elapsed; $('vtimer').textContent=fmt(Math.ceil(rem)); if(rem<=0){ $('vstatus').textContent='時間到'; endSession(); } }
    else $('vtimer').textContent=fmt(Math.floor(elapsed));
  }

  async function applyCamera(){
    if(camera){ try{ camera.stop(); }catch(_){} }
    camera=new Camera(cam,{onFrame:async()=>{await pose.send({image:cam});},width:1280,height:720,facingMode:facing});
    await camera.start();
    const t = facing==='user' ? 'scaleX(-1)' : 'none';
    cam.style.transform=t; overlay.style.transform=t;
  }
  async function initCamera(){
    if(typeof Pose==='undefined'){ $('hint').innerHTML='⚠️ 無法載入 MediaPipe（網路或 CDN 被擋）。請以 https / localhost 開啟後重試。'; return false; }
    if(!pose){
      pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
      pose.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:.5,minTrackingConfidence:.5});
      pose.onResults(onResults);
      cam.addEventListener('loadedmetadata',()=>{overlay.width=cam.videoWidth;overlay.height=cam.videoHeight;});
    }
    try{ await applyCamera(); }
    catch(e){ $('hint').innerHTML='⚠️ 無法開啟鏡頭。請允許相機權限，並確認以 https 或 localhost 開啟。'; return false; }
    overlay.width=cam.videoWidth||1280; overlay.height=cam.videoHeight||720;
    cameraStarted=true; $('hint').style.display='none'; $('camswitch').classList.add('show'); return true;
  }
  async function ensureCamera(){ if(cameraStarted) return true; return await initCamera(); }
  async function toggleCamera(){ const prev=facing; facing=facing==='user'?'environment':'user'; if(!cameraStarted) return; try{ await applyCamera(); }catch(e){ facing=prev; try{ await applyCamera(); }catch(_){} } }

  function presetBadge(){ $('vstatus').textContent='等待開始按壓…'; $('vtimer').textContent=durationMin>0?fmt(durationMin*60):'00:00'; }
  function resetState(){ sig=[];comps=[];armLog=[];rateLog=[];recoilLog=[];series=[];state='up';releaseMinY=1;measureStartT=null;armed=false;calTop=1;calBottom=0;postureSinceT=null;lastPostureT=0;
    setRate(null); setRecoilFill(0); setArms(null,null); $('warn').classList.remove('show'); presetBadge(); }

  async function startSession(){
    if(!await ensureCamera()) return;
    resetState(); running=true;
    $('badge').style.display='block';
    toggle.innerHTML=ICON_STOP; toggle.classList.add('is-stop');
    $('restart').style.display='inline-flex'; $('dur').disabled=true;
    timerId=setInterval(tick,250);
  }
  function restartSession(){ resetState(); }
  function endSession(){
    if(!running) return; running=false; clearInterval(timerId);
    $('badge').style.display='none';
    toggle.textContent='開始'; toggle.classList.remove('is-stop');
    $('restart').style.display='none'; $('dur').disabled=false; $('warn').classList.remove('show');
    buildReport(); $('results').classList.add('show');
    if(typeof gtag==='function') gtag('event','cpr_session_complete',{compressions:comps.length, duration_sec:Math.round(measureStartT?(performance.now()-measureStartT)/1000:0)});
  }

  function buildReport(){
    let dur = measureStartT!=null ? (performance.now()-measureStartT)/1000 : 0;
    if(durationMin>0) dur=Math.min(dur, durationMin*60);
    const n=comps.length;
    let meanRate=null, inBand=null;
    if(n>=2){ meanRate=Math.round(60000*(n-1)/(comps[n-1].t-comps[0].t)); }
    if(rateLog.length){ inBand=Math.round(rateLog.filter(r=>r>=BLO&&r<=BHI).length/rateLog.length*100); }
    const aLg=armLog.filter(v=>v!=null);
    const armPct=aLg.length?Math.round(aLg.filter(Boolean).length/aLg.length*100):null;
    const recPct=recoilLog.length?Math.round(recoilLog.filter(Boolean).length/recoilLog.length*100):null;

    $('repMeta').textContent = n===0 ? '本次未偵測到規律按壓。' : `時長 ${Math.floor(dur/60)} 分 ${Math.round(dur%60)} 秒　·　共 ${n} 次下壓`;
    $('rateAcc').textContent = inBand==null?'--':inBand+'%'; $('rateAcc').style.color = inBand==null?'var(--idle)':(inBand>=80?'var(--good)':'var(--warn)');
    $('meanRate').textContent = meanRate==null?'--':meanRate;
    if(meanRate==null){ $('needleWrapR').setAttribute('visibility','hidden'); }
    else { $('needleWrapR').setAttribute('visibility','visible'); rotateNeedle($('needleR'),meanRate);
      $('bandLeftR').setAttribute('stroke', meanRate<BLO?'var(--warn)':'var(--track)'); $('bandRightR').setAttribute('stroke', meanRate>BHI?'var(--warn)':'var(--track)'); }
    $('recoilAcc').textContent = recPct==null?'--':recPct+'%'; $('recoilAcc').style.color = recPct==null?'var(--idle)':(recPct>=90?'var(--good)':'var(--warn)');
    fillDiamond($('recoilFillR'), recPct==null?0:recPct/100); $('recoilFillR').setAttribute('fill',(recPct!=null&&recPct>=90)?'var(--good)':'var(--warn)');
    $('armAcc').textContent = armPct==null?'--':armPct+'%'; $('armAcc').style.color = armPct==null?'var(--idle)':(armPct>=80?'var(--good)':'var(--warn)');
    const ac = armPct==null?'var(--idle)':(armPct>=80?'var(--good)':'var(--warn)');
    $('armFigLR').setAttribute('stroke',ac); $('armFigRR').setAttribute('stroke',ac);
  }

  function drawChart(){
    const c=$('rateChart'), dpr=window.devicePixelRatio||1, W=c.clientWidth, H=c.clientHeight;
    c.width=W*dpr; c.height=H*dpr; const x=c.getContext('2d'); x.setTransform(dpr,0,0,dpr,0,0); x.clearRect(0,0,W,H);
    const padL=40,padR=12,padT=10,padB=24, plotW=W-padL-padR, plotH=H-padT-padB; x.font='10px sans-serif';
    if(series.length<2){ x.fillStyle='#9bb0c0'; x.fillText('資料不足',padL,padT+20); return; }
    const tMax=Math.max(1, series[series.length-1].t), yMin=60, yMax=160;
    const sx=t=>padL+(t/tMax)*plotW, sy=b=>padT+(1-(clamp(b,yMin,yMax)-yMin)/(yMax-yMin))*plotH;
    x.fillStyle='rgba(46,158,99,.15)'; x.fillRect(padL, sy(120), plotW, sy(100)-sy(120));
    x.fillStyle='#8aa0b3'; x.textAlign='right';
    [60,100,120,160].forEach(v=>{ const yy=sy(v); x.fillText(v,padL-5,yy+3); x.strokeStyle='rgba(0,0,0,.06)'; x.beginPath(); x.moveTo(padL,yy); x.lineTo(padL+plotW,yy); x.stroke(); });
    x.textAlign='center'; for(let i=0;i<=4;i++){ const tt=tMax*i/4; x.fillText(Math.round(tt)+'s', sx(tt), padT+plotH+15); }
    x.strokeStyle='#dde4ea'; x.beginPath(); x.moveTo(padL,padT); x.lineTo(padL,padT+plotH); x.lineTo(padL+plotW,padT+plotH); x.stroke();
    x.strokeStyle='#37668a'; x.lineWidth=2; x.beginPath(); series.forEach((p,i)=>{ const X=sx(p.t),Y=sy(p.bpm); i?x.lineTo(X,Y):x.moveTo(X,Y); }); x.stroke();
    x.fillStyle='#37668a'; series.forEach(p=>{ x.beginPath(); x.arc(sx(p.t),sy(p.bpm),2.2,0,7); x.fill(); });
  }

  $('dur').addEventListener('change',e=>{ durationMin=parseInt(e.target.value,10)||0; if(cameraStarted&&!running) presetBadge(); });
  toggle.addEventListener('click',()=>{ running?endSession():startSession(); });
  $('restart').addEventListener('click',restartSession);
  $('camswitch').addEventListener('click',toggleCamera);
  $('again').addEventListener('click',()=>{ $('results').classList.remove('show'); presetBadge(); });
  $('rcSpeed').addEventListener('click',()=>{ $('chartModal').classList.add('show'); drawChart(); });
  $('chartClose').addEventListener('click',()=>$('chartModal').classList.remove('show'));
  $('chartModal').addEventListener('click',e=>{ if(e.target===$('chartModal')) $('chartModal').classList.remove('show'); });
  const GAS_URL='https://script.google.com/macros/s/AKfycby520jxIIki_xad3PiOF1KOQ_iSB-tQ9uxXOeGqUrUR4KOg0vqAe9rIVa4V-oo2xrxm/exec';
  $('fbOpen').addEventListener('click',()=>$('fbModal').classList.add('show'));
  $('fbCancel').addEventListener('click',()=>{$('fbModal').classList.remove('show');$('fbText').value='';});
  $('fbModal').addEventListener('click',e=>{if(e.target===$('fbModal')){$('fbModal').classList.remove('show');$('fbText').value='';}});
  $('fbSend').addEventListener('click',async()=>{
    const t=$('fbText').value.trim(); if(!t){alert('請輸入意見內容');return;}
    $('fbSend').disabled=true; $('fbSend').textContent='送出中…';
    try{
      await fetch(GAS_URL,{method:'POST',body:JSON.stringify({message:t,time:new Date().toLocaleString('zh-TW')}),mode:'no-cors'});
      alert('感謝您的意見！'); $('fbText').value=''; $('fbModal').classList.remove('show');
    }catch(e){ alert('送出失敗，請稍後再試。'); }
    $('fbSend').disabled=false; $('fbSend').textContent='送出';
  });
  $('hint').addEventListener('click',ensureCamera);
  ['','R'].forEach(s=>{ $('bandLeft'+s).setAttribute('d',segPath(GMIN,BLO)); $('band'+s).setAttribute('d',segPath(BLO,BHI)); $('bandRight'+s).setAttribute('d',segPath(BHI,GMAX)); });
  setRate(null);
})();
</script>
</body>
</html>
